<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicios Practicos del DOM</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="tarjeta">
        <h3>Generador de saludos</h3>
        <input type="text" id="nombreusuario" placeholder="Ingresa tu nombre">
        <button id="btnSaludo">Saludar</button>
        <p id="mensaje" style="color: cadetblue;"></p>
    </div>
    <div class="tarjeta">
        <h3>Ejercicio de suscripciones</h3>
        <form id="formSuscripcion">
            <label for="correoUsuario">Correo electrónico</label>
            <input type="email" id="correoUsuario" placeholder="Ingresa tu correo electrónico" required>
            <button type="submit">Suscribirse</button>
            <p id="mensajeExito" style="color: cadetblue; margin-top: 10px;"></p>
        </form>
    </div>
    <script src="script.js"></script>
</body> 
</html>
